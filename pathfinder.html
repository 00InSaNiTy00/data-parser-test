<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pathfinder Sentinel v25.0 - Enterprise PDF Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            /* Material Design 3 Professional Palette - Slate & Tech Blue */
            --md-sys-color-background: #0f172a;
            --md-sys-color-surface: #1e293b;
            --md-sys-color-surface-container: #334155;
            --md-sys-color-primary: #3b82f6;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #1e3a8a;
            --md-sys-color-on-surface: #f8fafc;
            --md-sys-color-outline: #64748b;
            --md-sys-color-error: #ef4444;
            --md-sys-color-on-error: #ffffff;
            --glass-bg: rgba(30, 41, 59, 0.85);
        }

        body { 
            background-color: var(--md-sys-color-background); 
            color: var(--md-sys-color-on-surface); 
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            min-height: 100vh;
            margin: 0;
        }

        .mono-text { font-family: 'SF Mono', 'Courier New', Courier, monospace; }

        .loader { border-top-color: var(--md-sys-color-primary); animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .editable-addr { 
            outline: none; 
            border-radius: 8px;
            padding: 4px 8px;
            margin-left: -8px; 
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .editable-addr:focus { 
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--md-sys-color-primary); 
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .btn-tonal {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            transition: transform 0.1s, background-color 0.2s;
        }
        .btn-tonal:active { transform: scale(0.98); background-color: #2563eb; }

        .btn-outlined {
            border: 1px solid var(--md-sys-color-outline);
            color: var(--md-sys-color-on-surface);
            transition: background-color 0.2s;
        }
        .btn-outlined:active { background-color: rgba(255,255,255,0.05); }
        
        .btn-error-outlined {
            border: 1px solid var(--md-sys-color-error);
            color: var(--md-sys-color-error);
            transition: background-color 0.2s;
        }
        .btn-error-outlined:active { background-color: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body class="p-4 pb-32">

    <div class="mb-8 mt-4 text-center">
        <h1 class="text-4xl font-black tracking-tighter uppercase drop-shadow-md" style="color: var(--md-sys-color-primary);">Pathfinder</h1>
        <div class="mono-text text-[11px] font-bold opacity-70 tracking-[0.4em] mt-1" style="color: var(--md-sys-color-outline);">V25.0 - PDF NATIVE ENGINE</div>
    </div>

    <div class="mb-8 w-full max-w-lg mx-auto">
        <input type="file" id="file-input" accept="application/pdf" class="hidden">
        <button onclick="document.getElementById('file-input').click()" class="w-full btn-tonal py-5 rounded-[28px] font-bold text-lg uppercase tracking-widest shadow-[0_4px_14px_rgba(0,0,0,0.4)] flex flex-col items-center justify-center gap-1">
            <span>⚡ Carica Foglio Lavoro</span>
            <span class="text-[10px] font-normal tracking-[0.2em] opacity-80">(SOLO FILE PDF)</span>
        </button>
    </div>

    <div id="loading-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="flex flex-col items-center p-8 rounded-[32px] w-5/6 max-w-sm" style="background-color: var(--md-sys-color-surface-container); box-shadow: 0 24px 38px rgba(0,0,0,0.5);">
            <div class="loader rounded-full border-4 border-slate-700 h-16 w-16 mb-6"></div>
            <div id="loading-text" class="text-sm font-black uppercase animate-pulse tracking-widest text-center">
                Elaborazione...<br>
                <span class="text-[10px] opacity-70 mono-text mt-2 block" style="color: var(--md-sys-color-primary);">ESTRAZIONE NATIVA IN CORSO</span>
            </div>
        </div>
    </div>

    <div id="results-area" class="hidden max-w-lg mx-auto">
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="text-[11px] font-medium opacity-70 uppercase tracking-wider">Tap sul testo per correggere</div>
            <button onclick="generatePDF()" class="btn-outlined px-4 py-2 rounded-full text-[11px] font-bold uppercase tracking-wider shadow-sm flex items-center gap-2">
                <span class="text-lg leading-none">↓</span> EXPORT PDF
            </button>
        </div>
        <div id="address-list" class="space-y-4"></div>
    </div>

    <nav class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[calc(100%-32px)] max-w-lg h-[72px] backdrop-blur-xl border rounded-[36px] flex items-center justify-between p-2 shadow-[0_8px_24px_rgba(0,0,0,0.6)] z-40" style="background-color: var(--glass-bg); border-color: rgba(255,255,255,0.05);">
        <button onclick="location.reload()" class="h-full px-6 rounded-[28px] btn-error-outlined font-bold uppercase text-xs tracking-wider">
            Reset
        </button>
        <button onclick="openMaps()" class="h-full flex-1 ml-3 btn-tonal rounded-[28px] font-bold uppercase text-sm tracking-widest flex items-center justify-center gap-2">
            Naviga <span class="text-lg leading-none">↗</span>
        </button>
    </nav>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // Libreria parole e configurazione rimasta invariata
        const JUNK_WORDS = "RICHIEDENTE|DESCRIZIONE|EFFETTUATA|PROBLEMI|MONITOR|TASTIERA|SPEDITO|LENOVO|PORTATILE|UPS|TNT|MB2|C-920|STU-520|ZT611|SNC|TICKET|PLOTTER|PRT|MPS|AE221|ASUS|CONTABANCONOTE|PC|DESKTOP|BATTERIA|SOSTITUZIONE|GUASTO|RITIRO|CONSEGNA|APPUNTAMENTO|TELEFONO|CELLULARE|CLIENTE|REFERENTE|PIANO|SCALA|INTERNO|CITOFONO|ATTENZIONE|URGENTE|DIFETTO|ALIMENTATORE|CAVO|MOUSE|RAM|SCHEDA|MADRE|VIDEO|HARD|DISK|SSD|INSTALLAZIONE|CONFIGURAZIONE|STAMPANTE|TONER|RIFORNIMENTO|MULETTO|SPORTELLO|POSTAZIONE|UFFICIO|MAGAZZINO|REPARTO|DIRIGENTE|RESPONSABILE|ASSISTENZA|TECNICO|INTERVENTO|GARANZIA|S30|GBR|FIELD|CENTRO-NORD|POLO|ISSUE|WLAN|PAPER|JAM|SENSOR|SEPARATOR|PICK|ASSY|KIT|SERVICE|STATION|INKS|ADF|GSO|REDI|WIFI|INCH|SN|DW|POSTE|GENERICO|BREVE|ACCENDE|NON|SI|RIMANE|NERO|COLLEGAMENTO|DIFETTOSO|WKO|C1\\.1|NOK|IL|SU|PULIZIA|CAMBIO|INCHIOSTRO|MESSAGGIO|ERRORE|BOURRAGE|COGNOME|LUCA|ELEFONO|RICHIEDE|RIPARAZIONE|DELLA|ALEX|DUMITRU|TEL|INFO|INFORTECHSRLS|COM|BICI|ADJ|ST-150F|ELITEBOOK|WWAN|RTK|KBD|COVER|W/KB|EMEA|FREEZE";

        const CONFIG = {
            HOME: "Via Nicola Calipari 299 Crevalcore BO",
            COLOMBO: "Via Cristoforo Colombo 59 Bologna BO",
            MEDICINA: "Via Rosle 643 Medicina BO",
            SAVIGNO: "Via Savigno 5/B Bologna BO"
        };

        let route = [];

        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file || file.type !== 'application/pdf') {
                alert("Formato non valido. Per favore carica esclusivamente un file PDF.");
                return;
            }
            
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('hidden');
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                let fullText = '';
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += pageText + ' \n';
                }
                
                processSentinel(fullText);
                
            } catch (err) {
                console.error(err);
                alert("Errore irreversibile nella lettura del PDF.");
            } finally {
                overlay.classList.add('hidden');
            }
        };

        // Protocollo Eraser V2 - Chirurgia per PDF CSV-like
        function processSentinel(rawText) {
            const hasSavigno = /SAVIGNO|SAVIGN/i.test(rawText);
            const hasPoste = /POSTE|PT[0-9]|TICKET|CONTABANCONOTE/i.test(rawText);

            // Appiattimento e rimozione separatori tipici delle tabelle PDF
            let flatText = rawText
                .replace(/[\n\r|\[\]_"]/g, ' ') 
                .toUpperCase()
                .replace(/TNT\s+B[O0]/g, ' ') 
                .replace(/PORTA\s+B[O0]\s*LOGNA/g, 'PORTA BOLOGNA')
                .replace(/\bB[0O]\b/g, 'BO') 
                .replace(/\bF E\b/g, 'FE')
                .replace(/\bM[0O]\b/g, 'MO')
                .replace(/\bVLA\b/g, 'VIA')
                .replace(/\bVI A\b/g, 'VIA')
                .replace(/(\d{5})([A-Z]{2})\b/g, '$1 $2')
                .replace(/\s+/g, ' ');

            const startWords = /(?=\b(?:PIAZZALE|PIAZZA|VIA|CORSO|VIALE|STRADA|V\.LE|P\.ZZA|P\.ZA|C\.SO|P\.LE|PZ\.ZA|LUNGOMARE|VICOLO|BORGO|LOC\.|LOCALIT[AÀ]|FRAZ\.|FRAZIONE)\b)/;
            let chunks = flatText.split(startWords);

            let addresses = [];
            const junkRegex = new RegExp(`\\b(${JUNK_WORDS})\\b`, 'gi');
            
            const serialsRegex = /\b(?:PT\d{5,}|41\d{5,}|WS\d{5,}|CN[A-Z0-9]{4,}|M\d{3,}[A-Z]+|P\d{4,}[A-Z]+|T\d{4,}|1Z[0-9A-Z]{10,}|5CD[0-9A-Z]{6,})\b/gi;
            const provRegex = /\b(BO|FE|MO|RE|RA|FC|PR|RN|PC)\b/g;

            chunks.forEach(chunk => {
                if (!/^(PIAZZALE|PIAZZA|VIA|CORSO|VIALE|STRADA|V\.LE|P\.ZZA|P\.ZA|C\.SO|P\.LE|PZ\.ZA|LUNGOMARE|VICOLO|BORGO|LOC\.|LOCALIT[AÀ]|FRAZ\.|FRAZIONE)\b/.test(chunk)) return;

                let cleanChunk = chunk
                    .replace(junkRegex, ' ') 
                    .replace(serialsRegex, ' ') 
                    .replace(/\b\d{6,}\b/g, ' ') 
                    .replace(/\s+/g, ' ')
                    .trim();

                let cutIndex = -1;
                let matches = [...cleanChunk.matchAll(provRegex)];
                
                if (matches.length > 0) {
                    // Taglio netto ed esatto alla fine della sigla della provincia
                    cutIndex = matches[0].index + matches[0][0].length;
                }

                let finalExtraction = "";
                
                if (cutIndex !== -1) {
                    finalExtraction = cleanChunk.substring(0, cutIndex);
                } else {
                    finalExtraction = cleanChunk.substring(0, 80);
                }

                // Eliminazione chirurgica di virgole e caratteri spuri per un indirizzo perfetto
                let polishedAddr = finalExtraction
                    .replace(/[^A-Z0-9\s/.'-]/g, ' ') 
                    .replace(/\s+/g, ' ') 
                    .replace(/^[.,'\-\s]+|[.,'\-\s]+$/g, '') 
                    .trim();
                
                const isBase = ["COLOMBO", "ROSLE", "SAVIGNO", "CALIPARI"].some(key => polishedAddr.includes(key));
                
                if (polishedAddr.length > 6 && !isBase && /[A-Z]/.test(polishedAddr)) {
                    addresses.push(polishedAddr);
                }
            });

            const day = new Date().getDay();
            route = [CONFIG.HOME];
            if (day > 0 && day < 6) route.push(CONFIG.COLOMBO);
            if (hasSavigno) route.push(CONFIG.SAVIGNO);
            if (hasPoste) route.push(CONFIG.MEDICINA);
            
            [...new Set(addresses)].forEach(a => route.push(a));
            route.push(CONFIG.HOME);
            
            renderUI(hasPoste, hasSavigno);
        }

        // Render dell'interfaccia Enterprise
        function renderUI(alertPoste, alertSavigno) {
            const list = document.getElementById('address-list');
            document.getElementById('results-area').classList.remove('hidden');
            list.innerHTML = '';

            if(alertSavigno) list.innerHTML += `<div class="p-4 bg-yellow-900/30 border border-yellow-600/50 rounded-[16px] text-xs font-bold uppercase text-yellow-500 tracking-widest shadow-sm mb-4">⚠️ PRIORITÀ: RITIRO SAVIGNO</div>`;
            if(alertPoste) list.innerHTML += `<div class="p-4 bg-red-900/30 border border-red-800/50 rounded-[16px] text-xs font-bold uppercase text-red-400 tracking-widest shadow-sm mb-4">⚠️ PRIORITÀ: MAGAZZINO MEDICINA</div>`;

            route.forEach((addr, i) => {
                const isBase = (i === 0 || i === route.length - 1);
                const isSpecial = [CONFIG.COLOMBO, CONFIG.MEDICINA, CONFIG.SAVIGNO].includes(addr);
                
                let bgClass = "bg-[var(--md-sys-color-surface-container)]";
                let outlineClass = "border border-transparent";
                let labelColor = "color: var(--md-sys-color-primary);";
                let badgeText = `TARGET 0${i}`;

                if (i === 0) badgeText = 'START HQ';
                if (i === route.length - 1) badgeText = 'END HQ';

                if (isBase) {
                    bgClass = "bg-[var(--md-sys-color-surface)]";
                    outlineClass = "border border-white/10";
                    labelColor = "color: var(--md-sys-color-outline);";
                } else if (isSpecial) {
                    bgClass = "bg-[var(--md-sys-color-primary-container)]";
                    labelColor = "color: var(--md-sys-color-on-surface);";
                }
                
                const card = document.createElement('div');
                card.className = `relative p-5 rounded-[24px] mb-3 ${bgClass} ${outlineClass} shadow-sm`;
                
                card.innerHTML = `
                    <div class="pr-12">
                        <div class="text-[10px] font-black uppercase tracking-[0.2em] mb-2 mono-text opacity-80" style="${labelColor}">
                            ${badgeText}
                        </div>
                        <div class="text-[15px] font-semibold uppercase leading-snug editable-addr" 
                             ${!isBase && !isSpecial ? 'contenteditable="true"' : ''} 
                             data-index="${i}"
                             onblur="updateRoute(${i}, this.innerText)"
                             style="word-break: break-word; color: var(--md-sys-color-on-surface);">
                            ${addr}
                        </div>
                    </div>
                    ${!isBase ? `
                        <button onclick="removeTappa(${i})" class="absolute top-1/2 right-3 -translate-y-1/2 w-10 h-10 rounded-full flex items-center justify-center text-red-400 bg-red-900/20 hover:bg-red-900/40 transition-colors text-2xl font-light pb-1">
                            ×
                        </button>
                    ` : ''}
                `;
                list.appendChild(card);
            });
        }

        function updateRoute(index, newText) {
            route[index] = newText.trim().toUpperCase();
        }

        function removeTappa(index) {
            route.splice(index, 1);
            renderUI(false, false); 
        }

        function openMaps() {
            if (route.length < 2) return;
            const stops = route.map(a => encodeURIComponent(a)).join('/');
            window.open(`https://www.google.it/maps/dir/${stops}`, '_blank');
        }

        // Esportazione PDF
        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFillColor(15, 23, 42); 
            doc.rect(0, 0, 210, 297, 'F');
            
            doc.setTextColor(59, 130, 246); 
            doc.setFont("helvetica", "bold");
            doc.setFontSize(26);
            doc.text("MANIFESTO SPEDIZIONI", 105, 20, null, null, "center");
            
            doc.setFont("helvetica", "normal");
            doc.setFontSize(10);
            doc.setTextColor(148, 163, 184); 
            doc.text(`DATA MISSIONE: ${new Date().toLocaleDateString('it-IT')}`, 105, 28, null, null, "center");
            
            doc.setDrawColor(59, 130, 246);
            doc.line(20, 34, 190, 34);

            let yPos = 45;
            
            route.forEach((addr, i) => {
                if (yPos > 270) {
                    doc.addPage();
                    doc.setFillColor(15, 23, 42);
                    doc.rect(0, 0, 210, 297, 'F');
                    yPos = 20;
                }

                const isBase = (i === 0 || i === route.length - 1);
                
                doc.setFont("helvetica", "bold");
                doc.setFontSize(9);
                doc.setTextColor(59, 130, 246);
                const label = i === 0 ? '[START HQ]' : (i === route.length-1 ? '[END HQ]' : `[TARGET 0${i}]`);
                doc.text(label, 20, yPos);
                
                doc.setFont("helvetica", "bold");
                doc.setFontSize(12);
                doc.setTextColor(248, 250, 252); 
                
                const splitAddr = doc.splitTextToSize(addr, 150);
                doc.text(splitAddr, 45, yPos);
                
                yPos += (splitAddr.length * 6) + 7;
                
                if (!isBase) {
                    doc.setDrawColor(51, 65, 85); 
                    doc.line(20, yPos - 3, 190, yPos - 3);
                }
            });

            doc.save(`Ordine_Missione_${new Date().getTime()}.pdf`);
        }
    </script>
</body>
</html>
