<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical PDF v9.2 - Streamlined</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --camo-dark: #1a1c0e; 
            --camo-light: #8A9A5B; 
            --ui-bg: rgba(26, 28, 14, 0.95);
            --text-color: #8A9A5B;
            --bg-pattern: linear-gradient(45deg, #1a1c0e 25%, #2a2d1a 25%, #2a2d1a 50%, #1a1c0e 50%, #1a1c0e 75%, #2a2d1a 75%, #2a2d1a 100%);
        }

        .theme-retro {
            --camo-dark: #000000; --camo-light: #00ff41; --ui-bg: rgba(0, 0, 0, 0.98);
            --text-color: #00ff41; --bg-pattern: radial-gradient(circle, #001a00 0%, #000000 100%);
        }

        .theme-light {
            --camo-dark: #e0e0e0; --camo-light: #2d3436; --ui-bg: rgba(255, 255, 255, 0.95);
            --text-color: #2d3436; --bg-pattern: none;
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--camo-dark); background-image: var(--bg-pattern); background-size: 100px 100px;
            color: var(--text-color); font-family: 'Courier New', monospace; overflow: hidden;
            transition: all 0.3s ease;
        }

        #main-viewport {
            height: calc(100% - 100px); width: 100%; 
            overflow-y: auto; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
            padding: 10px 0 160px 0; -webkit-overflow-scrolling: touch;
        }

        #pages-container { width: 95%; max-width: 800px; position: relative; }
        .page-wrapper { position: relative; background: white; margin-bottom: 25px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        canvas { width: 100% !important; height: auto !important; display: block; }
        
        .interaction-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .interaction-layer > * { pointer-events: auto; }

        #bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 100px;
            background: var(--ui-bg); backdrop-filter: blur(15px);
            border-top: 3px solid var(--camo-light);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--camo-light); font-size: 10px; min-width: 60px; }
        .nav-icon { font-size: 28px; margin-bottom: 2px; }

        .color-dot { width: 32px; height: 32px; border-radius: 50%; border: 1px solid white; }
        .color-dot.active { border-color: var(--camo-light); box-shadow: 0 0 10px var(--camo-light); }

        #theme-selector {
            position: fixed; left: 10px; top: 30%; 
            display: flex; flex-direction: column; gap: 12px; z-index: 1001;
            background: var(--ui-bg); padding: 10px; border-radius: 15px; border: 1px solid var(--camo-light);
        }
        .theme-btn { font-size: 22px; cursor: pointer; filter: grayscale(1); transition: 0.2s; }
        .theme-btn.active { filter: grayscale(0); transform: scale(1.2); }

        .draggable { position: absolute; cursor: move; touch-action: none; padding: 5px; z-index: 100; }
        .draggable.active { border: 1px dashed var(--camo-light); background: rgba(138, 154, 91, 0.2); }
        
        .resizer {
            width: 35px; height: 35px; background: var(--camo-light);
            position: absolute; right: -17px; bottom: -17px;
            border-radius: 50%; border: 2px solid white; display: none;
        }
        .draggable.active .resizer { display: block; }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; padding: 20px;
        }
        #full-sig-pad { background: white; border-radius: 15px; width: 100%; height: 40vh; touch-action: none; }
    </style>
</head>
<body onclick="deselectAll()">

    <div id="main-viewport">
        <div id="pages-container">
            <div class="text-center mt-20 opacity-50 uppercase tracking-widest">Inizializzare Documento...</div>
        </div>
    </div>

    <div id="theme-selector">
        <div class="theme-btn active" onclick="applyTheme('camo', this)">🌲</div>
        <div class="theme-btn" onclick="applyTheme('retro', this)">📟</div>
        <div class="theme-btn" onclick="applyTheme('light', this)">☀️</div>
    </div>

    <div id="sig-modal" class="modal" onclick="event.stopPropagation()">
        <h2 class="mb-6 font-bold text-xl uppercase tracking-wider">Acquisizione Firma</h2>
        <canvas id="full-sig-pad"></canvas>
        <div class="flex gap-4 mt-8 w-full max-w-md">
            <button onclick="signaturePad.clear()" class="flex-1 border border-white py-4 rounded-2xl font-bold uppercase">Reset</button>
            <button onclick="confirmSignature()" class="flex-1 bg-white text-black font-bold py-4 rounded-2xl uppercase">Conferma</button>
        </div>
    </div>

    <nav id="bottom-nav" onclick="event.stopPropagation()">
        <div class="nav-item" onclick="document.getElementById('pdf-file').click()"><span class="nav-icon">📁</span><span>APRI</span></div>
        
        <div class="flex gap-4 px-2 border-l border-r border-zinc-800">
            <div id="dot-black" class="color-dot bg-black active" onclick="setTacticalColor('#000000', 'dot-black')"></div>
            <div id="dot-red" class="color-dot bg-red-600" onclick="setTacticalColor('#cc0000', 'dot-red')"></div>
            <div id="dot-blue" class="color-dot bg-blue-700" onclick="setTacticalColor('#0000bb', 'dot-blue')"></div>
        </div>

        <div class="nav-item" onclick="openModal('sig-modal')"><span class="nav-icon">🖋️</span><span>FIRMA</span></div>
        <div class="nav-item" onclick="addNote()"><span class="nav-icon">📝</span><span>NOTA</span></div>
        <div class="nav-item" onclick="generatePDF()"><span class="nav-icon text-white">💾</span><span class="font-bold">SALVA</span></div>
    </nav>

    <input type="file" id="pdf-file" class="hidden" accept=".pdf">

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let signaturePad, pdfBytes, elementsRegistry = [], currentColor = '#000000', isResizing = false;

        window.onload = () => {
            const canvas = document.getElementById('full-sig-pad');
            signaturePad = new SignaturePad(canvas, { penColor: 'black', minWidth: 2.5, maxWidth: 3.5 });
            window.addEventListener('resize', resizeSigPad);
            resizeSigPad();
        };

        function resizeSigPad() {
            const canvas = document.getElementById('full-sig-pad');
            const ratio = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * ratio; canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        }

        function applyTheme(mode, el) {
            document.body.className = '';
            if(mode !== 'camo') document.body.classList.add('theme-' + mode);
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        document.getElementById('pdf-file').onchange = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            pdfBytes = new Uint8Array(await file.arrayBuffer());
            const pdfDoc = await pdfjsLib.getDocument({data: pdfBytes.slice(0)}).promise;
            const container = document.getElementById('pages-container');
            container.innerHTML = ''; elementsRegistry = [];

            for(let i=1; i<=pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: 1.5 });
                const wrapper = document.createElement('div');
                wrapper.className = 'page-wrapper'; wrapper.id = `page-wrapper-${i}`;
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width; canvas.height = viewport.height;
                wrapper.appendChild(canvas);
                const layer = document.createElement('div');
                layer.className = 'interaction-layer'; layer.id = `layer-${i}`;
                wrapper.appendChild(layer);
                container.appendChild(wrapper);
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            }
        };

        function setTacticalColor(hex, id) {
            currentColor = hex; signaturePad.penColor = hex;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function createDraggable(type, val, targetLayerId = 'layer-1') {
            const id = 'el-' + Date.now();
            const wrap = document.createElement('div');
            wrap.id = id; wrap.className = 'draggable';
            wrap.style.top = '20px'; wrap.style.left = '20px'; wrap.style.color = currentColor;

            const content = document.createElement('div');
            content.className = 'content';
            if(type === 'note') {
                content.contentEditable = true; content.innerText = val;
                elementsRegistry.push({ id, type, color: currentColor, pageNum: parseInt(targetLayerId.split('-')[1]) });
            } else {
                const img = document.createElement('img');
                img.src = val; img.style.width = '120px';
                if(currentColor !== '#000000') img.style.filter = getColFilter(currentColor);
                content.appendChild(img);
                elementsRegistry.push({ id, type, data: val, color: currentColor, pageNum: parseInt(targetLayerId.split('-')[1]) });
            }

            wrap.appendChild(content);
            const res = document.createElement('div'); res.className = 'resizer'; wrap.appendChild(res);
            document.getElementById(targetLayerId).appendChild(wrap);
            initStableInteractions(wrap, (type === 'sig' ? content.querySelector('img') : content), type === 'sig');
        }

        function initStableInteractions(el, target, isImg) {
            let sx, sy, ix, iy, sw, sh, rt;
            const onMove = (e) => { if(isResizing) return; const ev = e.touches[0]; el.style.left = (ix + (ev.clientX - sx)) + 'px'; el.style.top = (iy + (ev.clientY - sy)) + 'px'; };
            el.addEventListener('touchstart', (e) => {
                if(e.target.className === 'resizer' || isResizing) return;
                deselectAll(); el.classList.add('active');
                const ev = e.touches[0]; sx = ev.clientX; sy = ev.clientY; ix = el.offsetLeft; iy = el.offsetTop;
                document.addEventListener('touchmove', onMove, {passive:false});
            }, {passive:false});
            document.addEventListener('touchend', () => document.removeEventListener('touchmove', onMove));

            const res = el.querySelector('.resizer');
            const onResizeMove = (e) => { e.preventDefault(); const ev = e.touches[0]; const nw = Math.max(40, sw + (ev.clientX - sx)); target.style.width = nw + 'px'; if(isImg) target.style.height = (nw/rt)+'px'; else el.style.fontSize = (nw/8)+'px'; };
            res.addEventListener('touchstart', (e) => { e.stopPropagation(); e.preventDefault(); isResizing = true; const ev = e.touches[0]; sx = ev.clientX; sw = target.offsetWidth; sh = target.offsetHeight; rt = sw/sh; document.addEventListener('touchmove', onResizeMove, {passive:false}); }, {passive:false});
            document.addEventListener('touchend', () => isResizing = false);
        }

        function getColFilter(hex) {
            if(hex === '#cc0000') return "invert(13%) sepia(80%) saturate(6144%) hue-rotate(351deg) brightness(89%) contrast(121%)";
            if(hex === '#0000bb') return "invert(11%) sepia(100%) saturate(5431%) hue-rotate(244deg) brightness(85%) contrast(131%)";
            return "none";
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; if(id === 'sig-modal') resizeSigPad(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function deselectAll() { if(!isResizing) document.querySelectorAll('.draggable').forEach(d => d.classList.remove('active')); }

        function confirmSignature() { if(signaturePad.isEmpty()) return; createDraggable('sig', signaturePad.toDataURL(), 'layer-1'); closeModal('sig-modal'); }
        function addNote() { createDraggable('note', 'EDITA TESTO', 'layer-1'); }

        async function generatePDF() {
            if(!pdfBytes) return;
            const lib = await PDFLib.PDFDocument.load(pdfBytes.slice(0));
            const pages = lib.getPages();
            for(let item of elementsRegistry) {
                const el = document.getElementById(item.id); if(!el) continue;
                const page = pages[item.pageNum - 1];
                const layer = document.getElementById(`layer-${item.pageNum}`);
                const { width, height } = page.getSize();
                const sx = width / layer.offsetWidth, sy = height / layer.offsetHeight;
                const r = parseInt(item.color.slice(1,3),16)/255; const g = parseInt(item.color.slice(3,5),16)/255; const b = parseInt(item.color.slice(5,7),16)/255;
                if(item.type !== 'sig') {
                    const c = el.querySelector('.content'); const fs = parseFloat(window.getComputedStyle(c).fontSize) * sx;
                    page.drawText(c.innerText.trim(), { x: el.offsetLeft * sx, y: height - (el.offsetTop * sy) - fs, size: fs, color: PDFLib.rgb(r,g,b)});
                } else {
                    const img = await lib.embedPng(item.data.split(',')[1]); const i = el.querySelector('img');
                    page.drawImage(img, { x: el.offsetLeft * sx, y: height - (el.offsetTop * sy) - (i.offsetHeight * sy), width: i.offsetWidth * sx, height: i.offsetHeight * sy });
                }
            }
            const res = await lib.save();
            const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([res],{type:"application/pdf"})); link.download = "Tactical_Final_v9_2.pdf"; link.click();
        }
    </script>
</body>
</html>
