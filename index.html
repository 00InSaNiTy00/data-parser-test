<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical PDF v12.0 - Phase 2</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg-dark: #12140a; --accent: #A3B86C; --ui-bg: rgba(20, 23, 11, 0.85); --text: #A3B86C;
            --pattern: repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 4px);
        }
        .theme-retro { --bg-dark: #000; --accent: #0f4; --ui-bg: rgba(0,20,0,0.85); --text: #0f4; --pattern: radial-gradient(circle, rgba(0,255,0,0.05), #000); }
        .theme-light { --bg-dark: #e5e7eb; --accent: #1f2937; --ui-bg: rgba(255,255,255,0.85); --text: #1f2937; --pattern: none; }
        .theme-cyber { --bg-dark: #050510; --accent: #00ffff; --ui-bg: rgba(5,5,16,0.85); --text: #ff00ff; --pattern: linear-gradient(0deg, rgba(255,0,255,0.05), transparent); }
        
        body, html { margin:0; padding:0; width:100%; height:100%; background-color:var(--bg-dark); background-image:var(--pattern); color:var(--text); font-family:monospace; overflow:hidden; transition:0.3s; }

        #main-viewport { height:calc(100% - 100px); width:100%; overflow-y:auto; display:flex; flex-direction:column; align-items:center; padding:20px 0 160px 0; -webkit-overflow-scrolling:touch; position: relative; }
        #pages-container { width:95%; max-width:800px; position:relative; }
        .page-wrapper { position:relative; background:white; margin-bottom:25px; box-shadow:0 10px 30px rgba(0,0,0,0.8); border-radius:4px; overflow:hidden; }
        canvas { width:100% !important; height:auto !important; display:block; }
        
        .interaction-layer { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
        .interaction-layer > * { pointer-events:auto; }

        /* Effetto Glassmorphism "Tactical HUD" */
        #bottom-nav { position:fixed; bottom:0; width:100%; height:100px; background:var(--ui-bg); backdrop-filter:blur(10px); border-top:2px solid var(--accent); display:flex; justify-content:flex-start; align-items:center; z-index:1000; padding-bottom:env(safe-area-inset-bottom); overflow-x:auto; gap: 15px; padding-left: 15px; padding-right: 15px; }
        #bottom-nav::-webkit-scrollbar { display: none; }
        .nav-item { display:flex; flex-direction:column; align-items:center; color:var(--accent); font-size:10px; cursor:pointer; min-width:60px; font-weight:bold; letter-spacing: 1px; transition: 0.2s; }
        .nav-item:active { transform: scale(0.9); }
        .nav-icon { font-size:22px; margin-bottom: 4px; }

        .color-dot { width:24px; height:24px; border-radius:50%; border:2px solid transparent; cursor:pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .color-dot.active { border-color:white; box-shadow:0 0 12px var(--accent); transform: scale(1.2); }

        #theme-selector { position:fixed; left:15px; top:40%; transform:translateY(-50%); display:flex; flex-direction:column; gap:12px; z-index:1001; background:var(--ui-bg); backdrop-filter:blur(10px); padding:10px; border-radius:20px; border:1px solid var(--accent); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .theme-btn { font-size:22px; cursor:pointer; opacity:0.5; transition:0.3s; }
        .theme-btn.active { opacity:1; transform:scale(1.2); filter: drop-shadow(0 0 8px var(--accent)); }

        .draggable { position:absolute; cursor:move; padding:10px; border:2px dashed transparent; touch-action:none; z-index:100; font-weight:bold; }
        .draggable.active { border-color:var(--accent); background:rgba(163, 184, 108, 0.15); border-radius: 4px; }
        
        .del-btn { position:absolute; top:-12px; right:-12px; width:26px; height:26px; background:#ef4444; color:white; border-radius:50%; display:none; align-items:center; justify-content:center; font-weight:bold; font-size:16px; box-shadow:0 2px 5px rgba(0,0,0,0.5); pointer-events: auto; cursor:pointer; }
        .draggable.active .del-btn { display:flex; }

        .resizer { width:26px; height:26px; background:var(--accent); position:absolute; right:-13px; bottom:-13px; border-radius:50%; display:none; border:2px solid var(--bg-dark); pointer-events: auto; cursor:nwse-resize; box-shadow:0 2px 5px rgba(0,0,0,0.5); }
        .draggable.active .resizer { display:block; }

        .modal { position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(5px); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:2000; padding:20px; }
        .sig-container { background:white; border:4px solid var(--accent); border-radius:8px; width:100%; max-width:500px; height:40vh; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        #full-sig-pad { width:100%; height:100%; touch-action:none; }
    </style>
</head>
<body onclick="deselectAll()">

    <div id="main-viewport"><div id="pages-container"><div class="text-center mt-32 opacity-50 uppercase tracking-widest text-lg">In attesa di file protocollato...</div></div></div>

    <div id="theme-selector">
        <div class="theme-btn active" onclick="applyTheme('camo', this)">🌲</div>
        <div class="theme-btn" onclick="applyTheme('retro', this)">📟</div>
        <div class="theme-btn" onclick="applyTheme('light', this)">☀️</div>
        <div class="theme-btn" onclick="applyTheme('cyber', this)">🌃</div>
    </div>

    <div id="sig-modal" class="modal" onclick="event.stopPropagation()">
        <h2 class="mb-4 font-bold text-2xl text-white uppercase tracking-widest" style="color: var(--accent); text-shadow: 0 0 10px var(--accent);">Acquisizione Firma</h2>
        <div class="sig-container"><canvas id="full-sig-pad"></canvas></div>
        <div class="flex gap-4 mt-6 w-full max-w-md">
            <button onclick="signaturePad.clear()" class="flex-1 border-2 py-3 rounded-md font-bold text-white uppercase" style="border-color: #ef4444;">Reset</button>
            <button onclick="confirmSignature()" class="flex-1 py-3 rounded-md font-bold text-black uppercase" style="background-color: var(--accent);">Conferma</button>
        </div>
    </div>

    <nav id="bottom-nav" onclick="event.stopPropagation()">
        <div class="nav-item" onclick="document.getElementById('pdf-file').click()"><span class="nav-icon">📂</span><span>OPEN</span></div>
        <div class="flex gap-3 px-3 border-l border-r border-zinc-600 items-center h-1/2">
            <div id="dot-black" class="color-dot bg-black active" onclick="setCol('#000000', this)"></div>
            <div id="dot-blue" class="color-dot bg-blue-800" onclick="setCol('#0000bb', this)"></div>
            <div id="dot-red" class="color-dot bg-red-600" onclick="setCol('#cc0000', this)"></div>
        </div>
        <div class="nav-item" onclick="openModal('sig-modal')"><span class="nav-icon">🖋️</span><span>FIRMA</span></div>
        <div class="nav-item" onclick="addNote()"><span class="nav-icon">📝</span><span>NOTA</span></div>
        <div class="nav-item" onclick="addDate()"><span class="nav-icon">📅</span><span>DATA</span></div>
        <div class="nav-item" onclick="addTime()"><span class="nav-icon">🕒</span><span>ORA</span></div>
        <div class="nav-item ml-auto" onclick="shareViaEmail()"><span class="nav-icon">📧</span><span>MAIL</span></div>
        <div class="nav-item" onclick="downloadPDF()"><span class="nav-icon text-white">💾</span><span class="text-white">SAVE</span></div>
    </nav>
    <input type="file" id="pdf-file" class="hidden" accept=".pdf">

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let signaturePad, pdfBytes, registry = [], currCol = '#000000', isResizing = false;
        
        // Imposta l'email di destinazione preferita qui
        const targetEmail = "indirizzo@esempio.com"; 

        window.onload = () => {
            signaturePad = new SignaturePad(document.getElementById('full-sig-pad'), { penColor:'black', minWidth:2, maxWidth:5 });
        };

        function applyTheme(mode, el) {
            document.body.className = mode === 'camo' ? '' : 'theme-' + mode;
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active')); el.classList.add('active');
        }

        function setCol(hex, el) {
            currCol = hex; signaturePad.penColor = hex;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); el.classList.add('active');
        }

        function openModal(id) { 
            document.getElementById(id).style.display = 'flex'; 
            if(id === 'sig-modal') setTimeout(() => {
                const canvas = document.getElementById('full-sig-pad');
                const rect = canvas.parentElement.getBoundingClientRect();
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvas.width = rect.width * ratio; canvas.height = rect.height * ratio;
                canvas.getContext("2d").scale(ratio, ratio);
                signaturePad.clear();
            }, 50); 
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function deselectAll() { if(!isResizing) document.querySelectorAll('.draggable').forEach(d => d.classList.remove('active')); }

        function getVisiblePage() {
            const wrappers = document.querySelectorAll('.page-wrapper');
            const viewport = document.getElementById('main-viewport');
            const scrollPos = viewport.scrollTop + 150;
            let target = { id: 'layer-1', num: 1 };
            wrappers.forEach((w, i) => {
                if (scrollPos >= w.offsetTop) target = { id: `layer-${i+1}`, num: i+1 };
            });
            return target;
        }

        document.getElementById('pdf-file').onchange = async (e) => {
            const f = e.target.files[0]; if(!f) return;
            pdfBytes = new Uint8Array(await f.arrayBuffer());
            const doc = await pdfjsLib.getDocument({data: pdfBytes.slice(0)}).promise;
            const cont = document.getElementById('pages-container'); cont.innerHTML = ''; registry = [];
            for(let i=1; i<=doc.numPages; i++) {
                const p = await doc.getPage(i), vp = p.getViewport({scale:1.5});
                const w = document.createElement('div'); w.className = 'page-wrapper';
                const c = document.createElement('canvas'); c.width = vp.width; c.height = vp.height;
                const l = document.createElement('div'); l.className = 'interaction-layer'; l.id = `layer-${i}`;
                w.append(c, l); cont.appendChild(w);
                await p.render({canvasContext: c.getContext('2d'), viewport: vp}).promise;
            }
        };

        function addObj(type, val) {
            if(!pdfBytes) { alert("Carica prima un file PDF!"); return; }
            const p = getVisiblePage(), id = 'el-'+Date.now(), wrap = document.createElement('div');
            wrap.className = 'draggable active'; wrap.id = id; wrap.style.top = '100px'; wrap.style.left = '50px'; wrap.style.color = currCol;
            
            const cont = document.createElement('div'); cont.className = 'content';
            if(type !== 'sig') { 
                cont.contentEditable = true; cont.innerText = val; 
                registry.push({id, type, color:currCol, num:p.num}); 
            } else { 
                const img = document.createElement('img'); img.src = val; img.style.width = '150px'; 
                if(currCol!=='#000000') img.style.filter = currCol==='#cc0000'?"invert(13%) sepia(80%) saturate(6144%) hue-rotate(351deg) brightness(89%) contrast(121%)":"invert(11%) sepia(100%) saturate(5431%) hue-rotate(244deg) brightness(85%) contrast(131%)";
                cont.appendChild(img); registry.push({id, type, data:val, color:currCol, num:p.num}); 
            }
            
            const del = document.createElement('div'); del.className = 'del-btn'; del.innerHTML = '×';
            del.onclick = (e) => { e.stopPropagation(); wrap.remove(); registry = registry.filter(r => r.id !== id); };
            
            const res = document.createElement('div'); res.className = 'resizer';
            wrap.append(cont, del, res); document.getElementById(p.id).appendChild(wrap); deselectAll(); 
            initDraggable(wrap, type==='sig'?cont.querySelector('img'):cont, type==='sig');
        }

        function initDraggable(wrap, target, isImg) {
            let sx, sy, ix, iy, sw, rt;
            
            // Gestione mista Mouse e Touch per spostamento
            const move = e => { 
                if(isResizing) return; 
                e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                wrap.style.left = (ix+(clientX-sx))+'px'; 
                wrap.style.top = (iy+(clientY-sy))+'px'; 
            };
            
            const startMove = e => { 
                if(isResizing || e.target.className==='resizer' || e.target.className==='del-btn') return; 
                deselectAll(); wrap.classList.add('active'); 
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                sx=clientX; sy=clientY; ix=wrap.offsetLeft; iy=wrap.offsetTop; 
                document.addEventListener(e.type === 'touchstart' ? 'touchmove' : 'mousemove', move, {passive:false}); 
            };
            
            wrap.ontouchstart = startMove; wrap.onmousedown = startMove;

            // Gestione mista Mouse e Touch per ridimensionamento
            const res = wrap.querySelector('.resizer');
            const resize = e => { 
                e.preventDefault(); 
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const nw = Math.max(40, sw+(clientX-sx)); 
                target.style.width = nw+'px'; 
                if(isImg) target.style.height = (nw/rt)+'px'; else wrap.style.fontSize = (nw/8)+'px'; 
            };

            const startResize = e => { 
                e.stopPropagation(); e.preventDefault(); isResizing=true; 
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                sx=clientX; sw=target.offsetWidth; rt=sw/target.offsetHeight; 
                document.addEventListener(e.type === 'touchstart' ? 'touchmove' : 'mousemove', resize, {passive:false}); 
            };

            res.ontouchstart = startResize; res.onmousedown = startResize;

            // Pulizia eventi
            const endAll = () => {
                isResizing=false;
                document.removeEventListener('touchmove', move); document.removeEventListener('mousemove', move);
                document.removeEventListener('touchmove', resize); document.removeEventListener('mousemove', resize);
            };
            document.addEventListener('touchend', endAll); document.addEventListener('mouseup', endAll);
        }

        function addDate() {
            const now = new Date();
            const ts = `${now.getDate().toString().padStart(2,'0')}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()}`;
            addObj('note', ts);
        }

        function addTime() {
            const now = new Date();
            const ts = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            addObj('note', ts);
        }

        function confirmSignature() { if(!signaturePad.isEmpty()) addObj('sig', signaturePad.toDataURL()); closeModal('sig-modal'); }
        function addNote() { addObj('note', 'TESTO...'); }

        // Motore centrale per generare il PDF
        async function buildPDFBlob() {
            if(!pdfBytes) return null; 
            const lib = await PDFLib.PDFDocument.load(pdfBytes.slice(0)); 
            const pages = lib.getPages();
            
            for(let item of registry) {
                const el = document.getElementById(item.id); 
                if(!el) continue;
                const contentEl = el.querySelector('.content');
                const p = pages[item.num-1], l = document.getElementById(`layer-${item.num}`), {width, height} = p.getSize();
                const rx = width/l.offsetWidth, ry = height/l.offsetHeight;
                const rgb = PDFLib.rgb(parseInt(item.color.slice(1,3),16)/255, parseInt(item.color.slice(3,5),16)/255, parseInt(item.color.slice(5,7),16)/255);
                
                if(item.type !== 'sig') { 
                    const fs = parseFloat(window.getComputedStyle(el).fontSize) * rx; 
                    p.drawText(contentEl.innerText.trim(), {x:el.offsetLeft*rx, y:height-(el.offsetTop*ry)-fs, size:fs, color:rgb}); 
                } else { 
                    const imgData = item.data.split(',')[1];
                    const img = await lib.embedPng(imgData); 
                    const i = contentEl.querySelector('img'); 
                    p.drawImage(img, {x:el.offsetLeft*rx, y:height-(el.offsetTop*ry)-(i.offsetHeight*ry), width:i.offsetWidth*rx, height:i.offsetHeight*ry}); 
                }
            }
            const savedBytes = await lib.save();
            return new Blob([savedBytes], {type: "application/pdf"});
        }

        async function downloadPDF() {
            try {
                const blob = await buildPDFBlob();
                if(!blob) return;
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "Tactical_Document_v12.pdf";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                console.error(err); alert("Errore di salvataggio: " + err.message);
            }
        }

        async function shareViaEmail() {
            try {
                const blob = await buildPDFBlob();
                if(!blob) return alert("Carica e compila un file prima di inviare!");
                
                const file = new File([blob], "Documento_Compilato.pdf", { type: "application/pdf" });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        title: 'Documento Tattico Compilato',
                        text: 'Ecco il documento elaborato tramite Tactical PDF. (Invia a: ' + targetEmail + ')',
                        files: [file]
                    });
                } else {
                    alert("Il tuo browser/dispositivo non supporta la condivisione diretta con allegati. Il file verrà scaricato, allegalo manualmente a una mail per: " + targetEmail);
                    downloadPDF();
                }
            } catch (err) {
                console.error("Condivisione annullata o fallita", err);
            }
        }
    </script>
</body>
</html>
