<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hub Operativo - Pathfinder & Firma PDF</title>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --camo-bg: #2b2d28;
      --camo-dark: #1a1c18;
      --camo-tab: #3a3f2d;
      --camo-active: #556b2f;
      --camo-text: #e1e3d3;
      --camo-accent: #8f9779;
    }

    body {
      background-color: var(--camo-bg);
      color: var(--camo-text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden; /* Evita lo scroll della pagina principale */
    }

    .app-hub-container {
      width: 100%;
      /* Usiamo dvh per evitare i tagli su schermi mobile */
      height: 100dvh; 
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* --- MENU FLUTTUANTE E SIDEBAR --- */
    
    .menu-toggle {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 100;
      background-color: var(--camo-dark);
      color: var(--camo-text);
      border: 2px solid var(--camo-accent);
      border-radius: 6px;
      padding: 10px 15px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
      transition: background-color 0.3s;
    }

    .menu-toggle:hover {
      background-color: var(--camo-tab);
    }

    .sidebar-menu {
      position: absolute;
      top: 0;
      left: -260px; /* Nascosto fuori dallo schermo */
      width: 260px;
      height: 100%;
      background-color: var(--camo-dark);
      box-shadow: 4px 0 10px rgba(0, 0, 0, 0.6);
      z-index: 200;
      transition: left 0.3s ease;
      display: flex;
      flex-direction: column;
      padding-top: 70px;
    }

    .sidebar-menu.open {
      left: 0; /* Entra nello schermo */
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      background: none;
      border: none;
      color: var(--camo-text);
      font-size: 30px;
      cursor: pointer;
    }

    /* Modifica ai bottoni delle Tab per la visualizzazione verticale */
    .tab-btn {
      background-color: transparent;
      color: var(--camo-text);
      border: none;
      outline: none;
      cursor: pointer;
      padding: 20px;
      font-size: 16px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: left;
      border-left: 5px solid transparent;
      transition: all 0.2s ease;
    }

    .tab-btn:hover {
      background-color: var(--camo-tab);
    }

    .tab-btn.active {
      background-color: var(--camo-active);
      color: #ffffff;
      border-left: 5px solid var(--camo-accent);
    }

    /* Sfondo scuro semitrasparente quando il menù è aperto */
    .menu-overlay {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 150;
    }

    .menu-overlay.active {
      display: block;
    }

    /* --- CONTENUTO IFRAME --- */

    .app-content {
      display: none;
      width: 100%;
      height: 100%;
      background-color: var(--camo-bg);
    }

    .app-content.active {
      display: block; /* Ora riempie tutto l'hub container */
    }

    .app-iframe {
      width: 100%;
      height: 100%; /* L'iframe si prende tutto lo spazio liberato dal menù fisso */
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div class="app-hub-container">
    
    <button class="menu-toggle" onclick="toggleMenu()">☰ MENU</button>

    <div class="menu-overlay" id="menu-overlay" onclick="toggleMenu()"></div>

    <div class="sidebar-menu" id="sidebar-menu">
      <button class="close-btn" onclick="toggleMenu()">&times;</button>
      <button class="tab-btn active" onclick="switchApp(event, 'pathfinder-app')">Pathfinder</button>
      <button class="tab-btn" onclick="switchApp(event, 'firma-app')">Firma PDF</button>
    </div>

    <div id="pathfinder-app" class="app-content active">
      <iframe src="pathfinder.html" class="app-iframe" title="Applicativo Pathfinder"></iframe>
    </div>

    <div id="firma-app" class="app-content">
      <iframe src="firma.html" class="app-iframe" title="Applicativo Firma PDF"></iframe>
    </div>
    
  </div>

  <script>
    // Apre e chiude la sidebar e l'overlay
    function toggleMenu() {
      document.getElementById("sidebar-menu").classList.toggle("open");
      document.getElementById("menu-overlay").classList.toggle("active");
    }

    function switchApp(evt, appName) {
      let contents = document.getElementsByClassName("app-content");
      for (let i = 0; i < contents.length; i++) {
        contents[i].classList.remove("active");
      }

      let btns = document.getElementsByClassName("tab-btn");
      for (let i = 0; i < btns.length; i++) {
        btns[i].classList.remove("active");
      }

      document.getElementById(appName).classList.add("active");
      evt.currentTarget.classList.add("active");

      // Chiude il menù automaticamente dopo aver fatto click
      toggleMenu();
    }
  </script>

</body>
</html>
