<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical PDF - Heavy Duty Edition</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --camo: #4B5320; --camo-dark: #1a1c0e; --camo-light: #8A9A5B; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--camo-dark); color: white; 
            font-family: 'Courier New', monospace; overflow: hidden;
        }

        #main-viewport {
            height: calc(100% - 90px); width: 100%; overflow: auto;
            display: flex; justify-content: center; align-items: flex-start;
            padding: 5px;
        }

        /* PDF rimpicciolito al 90% per visibilità totale su smartphone */
        #pdf-wrapper { 
            position: relative; background: white; 
            box-shadow: 0 0 40px rgba(0,0,0,0.9); 
            transform: scale(0.90); transform-origin: top center;
            margin-bottom: 100px;
        }
        
        #interaction-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #interaction-layer > * { pointer-events: auto; }

        #bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 90px;
            background: rgba(10, 12, 5, 0.95); backdrop-filter: blur(10px);
            border-top: 2px solid var(--camo-light);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; padding-bottom: 10px;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--camo-light); font-size: 9px; cursor: pointer; }
        .nav-icon { font-size: 22px; margin-bottom: 2px; }

        .color-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid white; cursor: pointer; transition: 0.2s; }
        .color-dot:active { transform: scale(1.2); }

        .draggable { position: absolute; cursor: move; touch-action: none; padding: 4px; border: 1px dashed transparent; }
        .draggable.active { border: 1px dashed var(--camo-light); background: rgba(138, 154, 91, 0.15); z-index: 500; }
        
        .content-note { background: transparent !important; outline: none; min-width: 50px; font-weight: bold; }

        .resizer {
            width: 26px; height: 26px; background: var(--camo-light);
            position: absolute; right: -13px; bottom: -13px;
            border-radius: 50%; border: 2px solid white; display: none;
        }
        .draggable.active .resizer { display: block; }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; padding: 15px;
        }
        #full-sig-pad { background: white; border-radius: 12px; width: 100%; height: 50vh; touch-action: none; }
        
        /* Nasconde scrollbar */
        #main-viewport::-webkit-scrollbar { display: none; }
    </style>
</head>
<body onclick="deselectAll()">

    <div id="main-viewport">
        <div id="pdf-wrapper">
            <canvas id="pdf-canvas"></canvas>
            <div id="interaction-layer"></div>
        </div>
    </div>

    <div id="sig-modal" class="modal" onclick="event.stopPropagation()">
        <h2 id="sig-title" class="mb-4 font-bold text-[#8a9a5b]">FIRMA (NERO)</h2>
        <canvas id="full-sig-pad"></canvas>
        <div class="flex gap-4 mt-8 w-full max-w-md">
            <button onclick="signaturePad.clear()" class="flex-1 border border-white py-4 rounded-xl font-bold">PULISCI</button>
            <button onclick="confirmSignature()" class="flex-1 bg-[#8a9a5b] text-black font-bold py-4 rounded-xl">CONFERMA</button>
        </div>
    </div>

    <nav id="bottom-nav" onclick="event.stopPropagation()">
        <div class="nav-item" onclick="document.getElementById('pdf-file').click()">
            <span class="nav-icon">📁</span><span>CARICA</span>
        </div>
        
        <div class="flex flex-col items-center gap-1">
            <div class="flex gap-3">
                <div class="color-dot bg-black" onclick="applyTacticalColor('#000000', 'NERO')"></div>
                <div class="color-dot bg-red-600" onclick="applyTacticalColor('#cc0000', 'ROSSO')"></div>
                <div class="color-dot bg-blue-700" onclick="applyTacticalColor('#0000bb', 'BLU')"></div>
            </div>
        </div>

        <div class="nav-item" onclick="openModal('sig-modal')">
            <span class="nav-icon">🖋️</span><span>FIRMA</span>
        </div>
        <div class="nav-item" onclick="addNote()">
            <span class="nav-icon">📝</span><span>NOTA</span>
        </div>
        <div class="nav-item" onclick="generatePDF()">
            <span class="nav-icon">💾</span><span class="text-white font-bold">SALVA</span>
        </div>
    </nav>

    <input type="file" id="pdf-file" class="hidden" accept=".pdf">

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        let signaturePad, pdfBytes, pdfDoc, currentPage = 1;
        let elementsRegistry = [];
        let currentTacticalColor = '#000000';

        window.onload = () => {
            const canvas = document.getElementById('full-sig-pad');
            // TRATTO OTTIMIZZATO: Non più invisibile, ma definito (1.5 - 2.0)
            signaturePad = new SignaturePad(canvas, { 
                penColor: 'black', minWidth: 1.5, maxWidth: 2.0
            });
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            createDraggable('base-n', 'text', 'OPERATORE: ...');
            createDraggable('base-d', 'text', 'DATA: ' + new Date().toLocaleDateString('it-IT'));
        };

        function resizeCanvas() {
            const canvas = document.getElementById('full-sig-pad');
            const ratio = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; setTimeout(resizeCanvas, 100); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function deselectAll() { document.querySelectorAll('.draggable').forEach(d => d.classList.remove('active')); }

        // --- APPLICAZIONE COLORE DINAMICA ---
        function applyTacticalColor(hex, label) {
            currentTacticalColor = hex;
            signaturePad.penColor = hex; // Imposta colore per la prossima firma
            document.getElementById('sig-title').innerText = `FIRMA (${label})`;
            document.getElementById('sig-title').style.color = hex === '#000000' ? '#8a9a5b' : hex;

            const active = document.querySelector('.draggable.active');
            if(!active) return;
            
            const item = elementsRegistry.find(i => i.id === active.id);
            if(item) {
                item.color = hex;
                if(item.type === 'sig') {
                    // Nota: il cambio colore firma esistente è solo visuale nell'anteprima
                    active.querySelector('img').style.filter = getFilterForHex(hex);
                } else {
                    active.style.color = hex;
                }
            }
        }

        function getFilterForHex(hex) {
            if(hex === '#cc0000') return "invert(13%) sepia(80%) saturate(6144%) hue-rotate(351deg) brightness(89%) contrast(121%)";
            if(hex === '#0000bb') return "invert(11%) sepia(100%) saturate(5431%) hue-rotate(244deg) brightness(85%) contrast(131%)";
            return "none";
        }

        function createDraggable(id, type, val) {
            const wrap = document.createElement('div');
            wrap.id = id; wrap.className = 'draggable';
            wrap.style.top = (id === 'base-d' ? '80px' : '20px');
            wrap.style.left = '20px';
            wrap.style.color = currentTacticalColor;

            const activate = (e) => { e.stopPropagation(); deselectAll(); wrap.classList.add('active'); };
            wrap.addEventListener('mousedown', activate);
            wrap.addEventListener('touchstart', activate);

            const content = document.createElement('div');
            content.className = 'content';
            
            if(type === 'text' || type === 'note') {
                if(type === 'note') { content.className += ' content-note'; content.contentEditable = true; }
                content.innerText = val;
                elementsRegistry.push({ id, type, color: currentTacticalColor });
            }

            if(type === 'sig') {
                const img = document.createElement('img');
                img.src = val; img.style.width = '130px'; img.style.pointerEvents = 'none';
                img.style.filter = getFilterForHex(currentTacticalColor);
                content.appendChild(img);
                elementsRegistry.push({ id, type, data: val, color: currentTacticalColor });
            }

            wrap.appendChild(content);
            const res = document.createElement('div'); res.className = 'resizer'; wrap.appendChild(res);
            
            if(!id.includes('base-')) {
                const del = document.createElement('div');
                del.innerHTML = '×';
                del.style = "position:absolute; top:-12px; left:-12px; background:#991b1b; color:white; border-radius:50%; width:24px; height:24px; display:none; align-items:center; justify-content:center; cursor:pointer; border:2px solid white;";
                del.className = "del-btn";
                del.onclick = () => { wrap.remove(); elementsRegistry = elementsRegistry.filter(e => e.id !== id); };
                wrap.appendChild(del);
                wrap.addEventListener('click', () => { 
                    document.querySelectorAll('.del-btn').forEach(b => b.style.display = 'none');
                    del.style.display = 'flex';
                });
            }

            document.getElementById('interaction-layer').appendChild(wrap);
            setupInteractions(wrap, (type === 'sig' ? content.querySelector('img') : content), type === 'sig');
        }

        function setupInteractions(el, target, isImg) {
            let startX, startY, initX, initY, startW, startH, ratio;
            const onMove = (e) => {
                const ev = e.touches ? e.touches[0] : e;
                el.style.left = (initX + (ev.clientX - startX)) + 'px';
                el.style.top = (initY + (ev.clientY - startY)) + 'px';
            };
            const onEnd = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('touchmove', onMove); };
            
            el.addEventListener('mousedown', (e) => {
                if(e.target.className === 'resizer' || e.target.contentEditable === "true") return;
                startX = e.clientX; startY = e.clientY; initX = el.offsetLeft; initY = el.offsetTop;
                document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onEnd);
            });
            el.addEventListener('touchstart', (e) => {
                if(e.target.className === 'resizer' || e.target.contentEditable === "true") return;
                const ev = e.touches[0]; startX = ev.clientX; startY = ev.clientY; initX = el.offsetLeft; initY = el.offsetTop;
                document.addEventListener('touchmove', onMove, {passive:false}); document.addEventListener('touchend', onEnd);
            });

            const res = el.querySelector('.resizer');
            const onResizeMove = (e) => {
                const ev = e.touches ? e.touches[0] : e;
                const newW = Math.max(40, startW + (ev.clientX - startX));
                target.style.width = newW + 'px';
                if(isImg) target.style.height = (newW / ratio) + 'px';
                else el.style.fontSize = (newW / 12) + 'px';
            };
            const startR = (e) => {
                e.stopPropagation(); e.preventDefault();
                const ev = e.touches ? e.touches[0] : e;
                startX = ev.clientX; startW = target.offsetWidth; startH = target.offsetHeight; ratio = startW/startH;
                document.addEventListener('mousemove', onResizeMove); document.addEventListener('touchmove', onResizeMove, {passive:false});
            };
            res.addEventListener('mousedown', startR); res.addEventListener('touchstart', startR);
            document.addEventListener('mouseup', () => { document.removeEventListener('mousemove', onResizeMove); });
            document.addEventListener('touchend', () => { document.removeEventListener('touchmove', onResizeMove); });
        }

        document.getElementById('pdf-file').onchange = async (e) => {
            const file = e.target.files[0];
            pdfBytes = new Uint8Array(await file.arrayBuffer());
            pdfDoc = await pdfjsLib.getDocument({data: pdfBytes.slice(0)}).promise;
            renderPage(1);
        };

        async function renderPage(num) {
            currentPage = num;
            const page = await pdfDoc.getPage(num);
            // Scala mobile ottimizzata
            const scale = window.innerWidth < 600 ? 1.0 : 1.5;
            const vp = page.getViewport({ scale });
            const canvas = document.getElementById('pdf-canvas');
            canvas.width = vp.width; canvas.height = vp.height;
            document.getElementById('pdf-wrapper').style.width = vp.width + "px";
            await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
        }

        function confirmSignature() {
            if(signaturePad.isEmpty()) return;
            createDraggable('sig-'+Date.now(), 'sig', signaturePad.toDataURL());
            closeModal('sig-modal');
        }
        function addNote() { createDraggable('note-'+Date.now(), 'note', 'Nuova Nota'); }

        async function generatePDF() {
            if(!pdfBytes) return alert("Carica un PDF!");
            const lib = await PDFLib.PDFDocument.load(pdfBytes.slice(0));
            const page = lib.getPages()[currentPage - 1];
            const { width, height } = page.getSize();
            const layer = document.getElementById('interaction-layer');
            const sx = width / layer.offsetWidth, sy = height / layer.offsetHeight;

            for(let item of elementsRegistry) {
                const el = document.getElementById(item.id);
                if(!el) continue;

                const hex = item.color || '#000000';
                const r = parseInt(hex.slice(1,3), 16) / 255;
                const g = parseInt(hex.slice(3,5), 16) / 255;
                const b = parseInt(hex.slice(5,7), 16) / 255;

                if(item.type === 'text' || item.type === 'note') {
                    const c = el.querySelector('.content');
                    const fs = parseFloat(window.getComputedStyle(c).fontSize) * sx;
                    page.drawText(c.innerText.trim(), { 
                        x: el.offsetLeft * sx, y: height - (el.offsetTop * sy) - fs, 
                        size: fs, color: PDFLib.rgb(r, g, b)
                    });
                } else if(item.type === 'sig') {
                    // La firma ora viene salvata con il colore selezionato
                    const pngUrl = item.data;
                    const imgData = await lib.embedPng(pngUrl.split(',')[1]);
                    const i = el.querySelector('img');
                    page.drawImage(imgData, { 
                        x: el.offsetLeft * sx, y: height - (el.offsetTop * sy) - (i.offsetHeight * sy), 
                        width: i.offsetWidth * sx, height: i.offsetHeight * sy 
                    });
                }
            }
            const res = await lib.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([res], {type:"application/pdf"}));
            link.download = "Tactical_Final_v6.pdf"; link.click();
        }
    </script>
</body>
</html>
