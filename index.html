<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical PDF v7 - Final Precision</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --camo: #4B5320; --camo-dark: #1a1c0e; --camo-light: #8A9A5B; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--camo-dark); color: white; 
            font-family: 'Courier New', monospace; overflow: hidden;
        }

        #main-viewport {
            height: calc(100% - 95px); width: 100%; overflow: auto;
            display: flex; justify-content: center; align-items: flex-start;
            padding: 5px; -webkit-overflow-scrolling: touch;
        }

        /* PDF rimpicciolito per stare sempre dentro lo schermo smartphone */
        #pdf-wrapper { 
            position: relative; background: white; 
            box-shadow: 0 0 40px rgba(0,0,0,0.9); 
            transform: scale(0.85); transform-origin: top center;
            margin-bottom: 120px;
            max-width: 95vw;
        }
        
        #interaction-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #interaction-layer > * { pointer-events: auto; }

        #bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 95px;
            background: rgba(10, 12, 5, 0.98); backdrop-filter: blur(10px);
            border-top: 2px solid var(--camo-light);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; padding-bottom: 15px;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--camo-light); font-size: 10px; cursor: pointer; }
        .nav-icon { font-size: 24px; margin-bottom: 3px; }

        .color-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid white; cursor: pointer; transition: 0.2s; }
        .color-dot.active { transform: scale(1.2); border-color: var(--camo-light); box-shadow: 0 0 10px white; }

        .draggable { position: absolute; cursor: move; touch-action: none; padding: 5px; border: 1px dashed transparent; }
        .draggable.active { border: 1px dashed var(--camo-light); background: rgba(138, 154, 91, 0.1); z-index: 500; }
        
        .content-note { background: transparent !important; outline: none; min-width: 60px; font-weight: bold; }

        /* Resizer più grande per le dita */
        .resizer {
            width: 30px; height: 30px; background: var(--camo-light);
            position: absolute; right: -15px; bottom: -15px;
            border-radius: 50%; border: 2px solid white; display: none;
            z-index: 600;
        }
        .draggable.active .resizer { display: block; }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; padding: 15px;
        }
        #full-sig-pad { background: white; border-radius: 12px; width: 100%; height: 50vh; touch-action: none; }
    </style>
</head>
<body onclick="deselectAll()">

    <div id="main-viewport">
        <div id="pdf-wrapper">
            <canvas id="pdf-canvas"></canvas>
            <div id="interaction-layer"></div>
        </div>
    </div>

    <div id="sig-modal" class="modal" onclick="event.stopPropagation()">
        <h2 id="sig-title" class="mb-4 font-bold text-[#8a9a5b] uppercase">Firma Operativa</h2>
        <canvas id="full-sig-pad"></canvas>
        <div class="flex gap-4 mt-8 w-full max-w-md">
            <button onclick="signaturePad.clear()" class="flex-1 border border-white py-4 rounded-xl font-bold">PULISCI</button>
            <button onclick="confirmSignature()" class="flex-1 bg-[#8a9a5b] text-black font-bold py-4 rounded-xl">CONFERMA</button>
        </div>
    </div>

    <div id="name-modal" class="modal" onclick="event.stopPropagation()">
        <h2 class="mb-4 font-bold text-[#8a9a5b]">NOME OPERATORE</h2>
        <input type="text" id="nameInput" placeholder="Inserisci qui..." class="w-full max-w-xs p-4 bg-zinc-900 border border-[#4b5320] rounded-xl mb-6 text-center" oninput="updateName()">
        <button onclick="closeModal('name-modal')" class="bg-white text-black font-bold py-3 px-10 rounded-full">OK</button>
    </div>

    <nav id="bottom-nav" onclick="event.stopPropagation()">
        <div class="nav-item" onclick="document.getElementById('pdf-file').click()">
            <span class="nav-icon">📁</span><span>APRI</span>
        </div>
        
        <div class="flex gap-4 px-2 border-l border-r border-zinc-700">
            <div id="dot-black" class="color-dot bg-black active" onclick="setGlobalColor('#000000', 'dot-black')"></div>
            <div id="dot-red" class="color-dot bg-red-600" onclick="setGlobalColor('#cc0000', 'dot-red')"></div>
            <div id="dot-blue" class="color-dot bg-blue-700" onclick="setGlobalColor('#0000bb', 'dot-blue')"></div>
        </div>

        <div class="nav-item" onclick="openModal('sig-modal')">
            <span class="nav-icon">🖋️</span><span>FIRMA</span>
        </div>
        <div class="nav-item" onclick="addNote()">
            <span class="nav-icon">📝</span><span>NOTA</span>
        </div>
        <div class="nav-item" onclick="openModal('name-modal')">
            <span class="nav-icon">👤</span><span>NOME</span>
        </div>
        <div class="nav-item" onclick="generatePDF()">
            <span class="nav-icon text-white">💾</span><span class="font-bold">SALVA</span>
        </div>
    </nav>

    <input type="file" id="pdf-file" class="hidden" accept=".pdf">

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        let signaturePad, pdfBytes, pdfDoc, currentPage = 1;
        let elementsRegistry = [];
        let currentColor = '#000000';

        window.onload = () => {
            const canvas = document.getElementById('full-sig-pad');
            // TRATTO PESANTE E DEFINITO (v7)
            signaturePad = new SignaturePad(canvas, { 
                penColor: 'black', minWidth: 2.5, maxWidth: 3.5 
            });
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            createDraggable('base-n', 'text', 'OP: ...');
            createDraggable('base-d', 'text', 'DATA: ' + new Date().toLocaleDateString('it-IT'));
        };

        function resizeCanvas() {
            const canvas = document.getElementById('full-sig-pad');
            const ratio = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
        }

        function setGlobalColor(hex, dotId) {
            currentColor = hex;
            signaturePad.penColor = hex;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            document.getElementById(dotId).classList.add('active');
            
            // Applica all'elemento attivo se presente
            const active = document.querySelector('.draggable.active');
            if(active) {
                const item = elementsRegistry.find(i => i.id === active.id);
                if(item) {
                    item.color = hex;
                    if(item.type === 'sig') active.querySelector('img').style.filter = getFilter(hex);
                    else active.style.color = hex;
                }
            }
        }

        function getFilter(hex) {
            if(hex === '#cc0000') return "invert(13%) sepia(80%) saturate(6144%) hue-rotate(351deg) brightness(89%) contrast(121%)";
            if(hex === '#0000bb') return "invert(11%) sepia(100%) saturate(5431%) hue-rotate(244deg) brightness(85%) contrast(131%)";
            return "none";
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; setTimeout(resizeCanvas, 100); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function deselectAll() { document.querySelectorAll('.draggable').forEach(d => d.classList.remove('active')); }
        function updateName() {
            const el = document.getElementById('base-n');
            if(el) el.querySelector('.content').innerText = "OP: " + (document.getElementById('nameInput').value || "...");
        }

        function createDraggable(id, type, val) {
            const wrap = document.createElement('div');
            wrap.id = id; wrap.className = 'draggable';
            wrap.style.top = (id === 'base-d' ? '80px' : '20px');
            wrap.style.left = '20px';
            wrap.style.color = currentColor;

            const act = (e) => { e.stopPropagation(); deselectAll(); wrap.classList.add('active'); };
            wrap.addEventListener('mousedown', act);
            wrap.addEventListener('touchstart', act);

            const content = document.createElement('div');
            content.className = 'content';
            
            if(type === 'text' || type === 'note') {
                if(type === 'note') { content.className += ' content-note'; content.contentEditable = true; }
                content.innerText = val;
                elementsRegistry.push({ id, type, color: currentColor });
            }

            if(type === 'sig') {
                const img = document.createElement('img');
                img.src = val; img.style.width = '140px'; img.style.pointerEvents = 'none';
                img.style.filter = getFilter(currentColor);
                content.appendChild(img);
                elementsRegistry.push({ id, type, data: val, color: currentColor });
            }

            wrap.appendChild(content);
            const res = document.createElement('div'); res.className = 'resizer'; wrap.appendChild(res);
            
            if(!id.includes('base-')) {
                const del = document.createElement('div');
                del.innerHTML = '×';
                del.style = "position:absolute; top:-15px; left:-15px; background:#7f1d1d; color:white; border-radius:50%; width:28px; height:28px; display:none; align-items:center; justify-content:center; border:2px solid white;";
                del.className = "del-btn";
                del.onclick = () => { wrap.remove(); elementsRegistry = elementsRegistry.filter(e => e.id !== id); };
                wrap.appendChild(del);
                wrap.addEventListener('touchstart', () => { 
                    document.querySelectorAll('.del-btn').forEach(b => b.style.display = 'none');
                    del.style.display = 'flex';
                });
            }

            document.getElementById('interaction-layer').appendChild(wrap);
            setupInt(wrap, (type === 'sig' ? content.querySelector('img') : content), type === 'sig');
        }

        function setupInt(el, target, isImg) {
            let startX, startY, initX, initY, startW, startH, ratio;
            const move = (e) => {
                const ev = e.touches ? e.touches[0] : e;
                el.style.left = (initX + (ev.clientX - startX)) + 'px';
                el.style.top = (initY + (ev.clientY - startY)) + 'px';
            };
            const end = () => { document.removeEventListener('mousemove', move); document.removeEventListener('touchmove', move); };
            
            el.addEventListener('mousedown', (e) => {
                if(e.target.className === 'resizer' || e.target.contentEditable === "true") return;
                startX = e.clientX; startY = e.clientY; initX = el.offsetLeft; initY = el.offsetTop;
                document.addEventListener('mousemove', move); document.addEventListener('mouseup', end);
            });
            el.addEventListener('touchstart', (e) => {
                if(e.target.className === 'resizer' || e.target.contentEditable === "true") return;
                const ev = e.touches[0]; startX = ev.clientX; startY = ev.clientY; initX = el.offsetLeft; initY = el.offsetTop;
                document.addEventListener('touchmove', move, {passive:false}); document.addEventListener('touchend', end);
            });

            const res = el.querySelector('.resizer');
            const rMove = (e) => {
                const ev = e.touches ? e.touches[0] : e;
                const newW = Math.max(50, startW + (ev.clientX - startX));
                target.style.width = newW + 'px';
                if(isImg) target.style.height = (newW / ratio) + 'px';
                else el.style.fontSize = (newW / 12) + 'px';
            };
            const rStart = (e) => {
                e.stopPropagation(); e.preventDefault();
                const ev = e.touches ? e.touches[0] : e;
                startX = ev.clientX; startW = target.offsetWidth; startH = target.offsetHeight; ratio = startW/startH;
                document.addEventListener('mousemove', rMove); document.addEventListener('touchmove', rMove, {passive:false});
            };
            res.addEventListener('mousedown', rStart); res.addEventListener('touchstart', rStart);
            document.addEventListener('mouseup', () => document.removeEventListener('mousemove', rMove));
            document.addEventListener('touchend', () => document.removeEventListener('touchmove', rMove));
        }

        document.getElementById('pdf-file').onchange = async (e) => {
            const file = e.target.files[0];
            pdfBytes = new Uint8Array(await file.arrayBuffer());
            pdfDoc = await pdfjsLib.getDocument({data: pdfBytes.slice(0)}).promise;
            const page = await pdfDoc.getPage(1);
            const scale = window.innerWidth < 600 ? 1.0 : 1.5;
            const vp = page.getViewport({ scale });
            const canvas = document.getElementById('pdf-canvas');
            canvas.width = vp.width; canvas.height = vp.height;
            document.getElementById('pdf-wrapper').style.width = vp.width + "px";
            await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
        };

        function confirmSignature() {
            if(signaturePad.isEmpty()) return;
            createDraggable('sig-'+Date.now(), 'sig', signaturePad.toDataURL());
            closeModal('sig-modal');
        }
        function addNote() { createDraggable('note-'+Date.now(), 'note', 'Nuova Nota'); }

        async function generatePDF() {
            if(!pdfBytes) return;
            const lib = await PDFLib.PDFDocument.load(pdfBytes.slice(0));
            const page = lib.getPages()[0];
            const { width, height } = page.getSize();
            const layer = document.getElementById('interaction-layer');
            const sx = width / layer.offsetWidth, sy = height / layer.offsetHeight;

            for(let item of elementsRegistry) {
                const el = document.getElementById(item.id);
                if(!el) continue;
                const r = parseInt(item.color.slice(1,3), 16) / 255 || 0;
                const g = parseInt(item.color.slice(3,5), 16) / 255 || 0;
                const b = parseInt(item.color.slice(5,7), 16) / 255 || 0;

                if(item.type !== 'sig') {
                    const c = el.querySelector('.content');
                    const fs = parseFloat(window.getComputedStyle(c).fontSize) * sx;
                    page.drawText(c.innerText.trim(), { 
                        x: el.offsetLeft * sx, y: height - (el.offsetTop * sy) - fs, 
                        size: fs, color: PDFLib.rgb(r, g, b)
                    });
                } else {
                    const img = await lib.embedPng(item.data.split(',')[1]);
                    const i = el.querySelector('img');
                    page.drawImage(img, { 
                        x: el.offsetLeft * sx, y: height - (el.offsetTop * sy) - (i.offsetHeight * sy), 
                        width: i.offsetWidth * sx, height: i.offsetHeight * sy 
                    });
                }
            }
            const res = await lib.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([res], {type:"application/pdf"}));
            link.download = "Documento_Final_v7.pdf"; link.click();
        }
    </script>
</body>
</html>
