<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Hub Operativo - Pathfinder & Firma PDF</title>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --camo-bg: #2b2d28;
      --camo-dark: #1a1c18;
      --camo-tab: #3a3f2d;
      --camo-active: #556b2f;
      --camo-text: #e1e3d3;
      --camo-accent: #8f9779;
    }

    body {
      background-color: var(--camo-bg);
      color: var(--camo-text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden; /* Evita lo scroll dell'intera pagina, delega lo scroll agli iframe */
    }

    .app-hub-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .tabs {
      display: flex;
      width: 100%;
      background-color: var(--camo-dark);
      flex-shrink: 0;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.4);
      z-index: 10;
    }

    .tab-btn {
      flex: 1;
      background-color: inherit;
      color: var(--camo-text);
      border: none;
      outline: none;
      cursor: pointer;
      padding: 18px 10px;
      font-size: 15px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: background-color 0.2s ease;
      text-align: center;
      user-select: none; 
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn:active {
      background-color: var(--camo-tab);
    }

    .tab-btn.active {
      background-color: var(--camo-active);
      color: #ffffff;
      border-bottom: 4px solid var(--camo-accent);
    }

    .app-content {
      display: none;
      flex-grow: 1;
      width: 100%;
      background-color: var(--camo-bg);
    }

    .app-content.active {
      display: flex; /* Flex permette all'iframe di espandersi completamente */
    }

    .app-iframe {
      width: 100%;
      flex-grow: 1;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div class="app-hub-container">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchApp(event, 'pathfinder-app')">Pathfinder</button>
      <button class="tab-btn" onclick="switchApp(event, 'firma-app')">Firma PDF</button>
    </div>

    <div id="pathfinder-app" class="app-content active">
      <iframe src="pathfinder.html" class="app-iframe" title="Applicativo Pathfinder"></iframe>
    </div>

    <div id="firma-app" class="app-content">
      <iframe src="firma.html" class="app-iframe" title="Applicativo Firma PDF"></iframe>
    </div>
  </div>

  <script>
    function switchApp(evt, appName) {
      // Nasconde tutte le app
      let contents = document.getElementsByClassName("app-content");
      for (let i = 0; i < contents.length; i++) {
        contents[i].classList.remove("active");
      }

      // Rimuove lo stato attivo dai pulsanti
      let btns = document.getElementsByClassName("tab-btn");
      for (let i = 0; i < btns.length; i++) {
        btns[i].classList.remove("active");
      }

      // Mostra l'app selezionata e illumina la tab
      document.getElementById(appName).classList.add("active");
      evt.currentTarget.classList.add("active");
    }
  </script>

</body>
</html>
