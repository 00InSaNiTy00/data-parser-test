<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical PDF Editor - Full Immersive</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --camo: #4B5320; --camo-dark: #1a1c0e; --camo-light: #8A9A5B;
            --accent: #d4d4d4;
        }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--camo-dark); color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Evita scroll della pagina intera */
        }

        /* --- EDITOR AREA --- */
        #main-viewport {
            height: calc(100% - 70px); /* Spazio per la barra in basso */
            width: 100%; overflow: auto;
            display: flex; justify-content: center; align-items: flex-start;
            padding: 10px; padding-bottom: 80px;
        }

        #pdf-wrapper { position: relative; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #interaction-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #interaction-layer > * { pointer-events: auto; }

        /* --- BOTTOM BAR --- */
        #bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 75px;
            background: rgba(20, 22, 10, 0.95);
            backdrop-filter: blur(10px);
            border-top: 2px solid var(--camo);
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; padding: 0 10px;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--camo-light); font-size: 10px; font-weight: bold;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .nav-item:active { transform: scale(0.9); color: white; }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }

        /* --- ELEMENTI SULLO SCHERMO --- */
        .draggable {
            position: absolute; cursor: move; touch-action: none;
            padding: 5px; border: 1px dashed transparent;
        }
        .draggable.active {
            border: 2px dashed var(--camo-light);
            background: rgba(255, 255, 255, 0.95); color: black; z-index: 500;
        }

        .resizer {
            width: 25px; height: 25px; background: var(--camo);
            position: absolute; right: -12px; bottom: -12px;
            border-radius: 50%; border: 2px solid white; display: none;
        }
        .draggable.active .resizer { display: block; }

        .delete-badge {
            position: absolute; top: -15px; left: -15px; background: #991b1b;
            width: 25px; height: 25px; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            color: white; font-weight: bold; border: 2px solid white;
        }
        .draggable.active .delete-badge { display: flex; }

        /* --- MODALS --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000; padding: 20px;
        }
        #full-sig-pad { background: white; border-radius: 12px; width: 100%; height: 60vh; }

        .camo-input {
            background: #2a2d1a; border: 1px solid var(--camo);
            color: white; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px;
        }
    </style>
</head>
<body onclick="deselectAll()">

    <div class="fixed top-0 left-0 w-full p-2 flex justify-between text-[10px] uppercase opacity-50 pointer-events-none z-50">
        <span id="page-info">Nessun Documento</span>
        <span>Tactical Full-Screen v3.0</span>
    </div>

    <div id="main-viewport">
        <div id="pdf-wrapper">
            <canvas id="pdf-canvas"></canvas>
            <div id="interaction-layer"></div>
        </div>
    </div>

    <div id="settings-modal" class="modal" onclick="event.stopPropagation()">
        <h2 class="mb-6 font-bold text-xl">DETTAGLI OPERATIVI</h2>
        <input type="text" id="nameInput" placeholder="Nome Operatore" class="camo-input" oninput="updateBaseElements()">
        <button onclick="closeModal('settings-modal')" class="bg-white text-black font-bold py-3 px-10 rounded-full">CONFERMA</button>
    </div>

    <div id="sig-modal" class="modal" onclick="event.stopPropagation()">
        <h2 class="mb-4 font-bold text-xl">FIRMA QUI</h2>
        <canvas id="full-sig-pad"></canvas>
        <div class="flex gap-4 mt-8 w-full">
            <button onclick="signaturePad.clear()" class="flex-1 border border-white py-3 rounded-xl">CLEAR</button>
            <button onclick="confirmSignature()" class="flex-1 bg-white text-black font-bold py-3 rounded-xl">OK</button>
        </div>
    </div>

    <nav id="bottom-nav" onclick="event.stopPropagation()">
        <div class="nav-item" onclick="document.getElementById('pdf-input').click()">
            <span class="nav-icon">📂</span>
            <span>Carica</span>
        </div>
        <div class="nav-item" onclick="openModal('settings-modal')">
            <span class="nav-icon">👤</span>
            <span>Profilo</span>
        </div>
        <div class="nav-item" onclick="openModal('sig-modal')">
            <span class="nav-icon">🖋️</span>
            <span>Firma</span>
        </div>
        <div class="nav-item" onclick="addNote()">
            <span class="nav-icon">📝</span>
            <span>Nota</span>
        </div>
        <div class="nav-item" onclick="changePage(1)">
            <span class="nav-icon">📖</span>
            <span>Pagina</span>
        </div>
        <div class="nav-item" onclick="generatePDF()" style="color: #8A9A5B;">
            <span class="nav-icon">💾</span>
            <span>Salva</span>
        </div>
    </nav>

    <input type="file" id="pdf-input" class="hidden" accept=".pdf">

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        
        let signaturePad, pdfBytes, pdfDoc, currentPage = 1, totalPages = 0;
        let signatures = [], notes = [];

        window.onload = () => {
            const canvas = document.getElementById('full-sig-pad');
            signaturePad = new SignaturePad(canvas, { penColor: 'black' });
            window.addEventListener('resize', resizeSigCanvas);
            resizeSigCanvas();
            
            // Crea elementi base
            createDraggable('base-name', 'text', 'OPERATORE: ...');
            createDraggable('base-date', 'text', 'DATA: ' + new Date().toLocaleDateString('it-IT'));
        };

        function resizeSigCanvas() {
            const canvas = document.getElementById('full-sig-pad');
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);
            signaturePad.clear();
        }

        // --- CORE LOGIC ---
        function openModal(id) { 
            document.getElementById(id).style.display = 'flex'; 
            if(id === 'sig-modal') setTimeout(resizeSigCanvas, 50);
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function deselectAll() {
            document.querySelectorAll('.draggable').forEach(d => d.classList.remove('active'));
        }

        function updateBaseElements() {
            const el = document.getElementById('base-name');
            const val = document.getElementById('nameInput').value || "...";
            if(el) el.querySelector('.content').innerText = "OPERATORE: " + val;
        }

        function createDraggable(id, type, val) {
            const wrap = document.createElement('div');
            wrap.id = id; wrap.className = 'draggable';
            wrap.style.top = (id === 'base-date' ? '60px' : '20px');
            wrap.style.left = '20px';

            wrap.addEventListener('touchstart', (e) => { e.stopPropagation(); deselectAll(); wrap.classList.add('active'); }, {passive:true});
            wrap.addEventListener('mousedown', (e) => { e.stopPropagation(); deselectAll(); wrap.classList.add('active'); });

            const content = document.createElement('div');
            content.className = 'content';
            if(type === 'note') {
                content.contentEditable = true;
                content.style.minWidth = "100px";
                content.style.background = "white";
                content.style.color = "black";
                content.style.padding = "5px";
                notes.push({id});
            }

            if(type === 'sig') {
                const img = document.createElement('img');
                img.src = val; img.style.width = '150px'; img.style.pointerEvents = 'none';
                content.appendChild(img);
                signatures.push({id, data: val});
            } else {
                content.innerText = val;
                if(type !== 'note') notes.push({id}); // Anche nome/data sono testi
            }

            wrap.appendChild(content);
            
            // Controlli
            const res = document.createElement('div'); res.className = 'resizer'; wrap.appendChild(res);
            const del = document.createElement('div'); del.innerHTML = '×'; del.className = 'delete-badge';
            del.onclick = () => wrap.remove();
            if(!id.includes('base-')) wrap.appendChild(del);

            document.getElementById('interaction-layer').appendChild(wrap);
            initDrag(wrap);
            initResize(wrap, (type === 'sig' ? content.querySelector('img') : content), type === 'sig');
        }

        // --- DRAG & RESIZE (MOBILE OPTIMIZED) ---
        function initDrag(el) {
            let startX, startY, initX, initY;
            const move = (e) => {
                const ev = e.touches ? e.touches[0] : e;
                el.style.left = (initX + (ev.clientX - startX)) + 'px';
                el.style.top = (initY + (ev.clientY - startY)) + 'px';
            };
            const start = (e) => {
                if (e.target.className === 'resizer' || e.target.contentEditable === "true") return;
                const ev = e.touches ? e.touches[0] : e;
                startX = ev.clientX; startY = ev.clientY;
                initX = el.offsetLeft; initY = el.offsetTop;
                document.addEventListener('mousemove', move);
                document.addEventListener('touchmove', move, {passive:false});
                document.addEventListener('mouseup', end); document.addEventListener('touchend', end);
            };
            const end = () => { document.removeEventListener('mousemove', move); document.removeEventListener('touchmove', move); };
            el.addEventListener('mousedown', start); el.addEventListener('touchstart', start, {passive:false});
        }

        function initResize(wrap, target, isImg) {
            const res = wrap.querySelector('.resizer');
            const move = (e) => {
                const ev = e.touches ? e.touches[0] : e;
                const newW = Math.max(40, startW + (ev.clientX - startX));
                target.style.width = newW + 'px';
                if(isImg) target.style.height = (newW / ratio) + 'px';
                else wrap.style.fontSize = (newW / 12) + 'px';
            };
            let startX, startW, startH, ratio;
            res.addEventListener('touchstart', (e) => {
                e.stopPropagation(); e.preventDefault();
                const ev = e.touches[0];
                startX = ev.clientX; startW = target.offsetWidth; startH = target.offsetHeight; ratio = startW/startH;
                document.addEventListener('touchmove', move, {passive:false});
            });
            document.addEventListener('touchend', () => document.removeEventListener('touchmove', move));
        }

        // --- PDF ENGINE ---
        document.getElementById('pdf-input').onchange = async (e) => {
            const file = e.target.files[0];
            pdfBytes = new Uint8Array(await file.arrayBuffer());
            pdfDoc = await pdfjsLib.getDocument({data: pdfBytes.slice(0)}).promise;
            totalPages = pdfDoc.numPages;
            renderPage(1);
        };

        async function renderPage(num) {
            currentPage = num;
            const page = await pdfDoc.getPage(num);
            const vp = page.getViewport({ scale: (window.innerWidth < 600 ? 0.8 : 1.3) });
            const canvas = document.getElementById('pdf-canvas');
            canvas.width = vp.width; canvas.height = vp.height;
            document.getElementById('pdf-wrapper').style.width = vp.width + "px";
            await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
            document.getElementById('page-info').innerText = `PAGINA ${num} DI ${totalPages}`;
        }

        function changePage() {
            if(!pdfDoc) return;
            let n = currentPage + 1;
            if (n > totalPages) n = 1;
            renderPage(n);
        }

        function confirmSignature() {
            if(signaturePad.isEmpty()) return;
            createDraggable('sig-'+Date.now(), 'sig', signaturePad.toDataURL());
            closeModal('sig-modal');
        }
        function addNote() { createDraggable('note-'+Date.now(), 'note', 'Inserisci testo...'); }

        async function generatePDF() {
            if (!pdfBytes) return alert("Carica un PDF!");
            const lib = await PDFLib.PDFDocument.load(pdfBytes.slice(0));
            const page = lib.getPages()[currentPage - 1];
            const { width, height } = page.getSize();
            const layer = document.getElementById('interaction-layer');
            const sx = width / layer.offsetWidth, sy = height / layer.offsetHeight;

            // Testi
            for (let n of notes) {
                const el = document.getElementById(n.id);
                if(el) {
                    const c = el.querySelector('.content');
                    const fs = parseFloat(window.getComputedStyle(c).fontSize) * sx;
                    page.drawText(c.innerText.trim(), { x: el.offsetLeft * sx, y: height - (el.offsetTop * sy) - fs, size: fs });
                }
            }
            // Firme
            for (let s of signatures) {
                const el = document.getElementById(s.id);
                if(el) {
                    const img = await lib.embedPng(s.data.split(',')[1]);
                    const i = el.querySelector('img');
                    page.drawImage(img, { x: el.offsetLeft * sx, y: height - (el.offsetTop * sy) - (i.offsetHeight * sy), width: i.offsetWidth * sx, height: i.offsetHeight * sy });
                }
            }
            const res = await lib.save();
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([res], {type: "application/pdf"}));
            link.download = "Tactical_Final.pdf"; link.click();
        }
    </script>
</body>
</html>
